<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNGraph AI</title>
    <meta name="description" content="SUNGraph AI — A solar-themed graphing calculator and AI math quiz.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        orbitron: ['Orbitron', 'sans-serif'],
                    },
                    colors: {
                        sun: '#f59e0b',
                        sunBright: '#fde047',
                        sunDeep: '#ea580c',
                        space: '#0a0500',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css?v=8">
    <script src="https://www.desmos.com/api/v1.9/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
</head>

<body class="ambient-bg text-white h-[100dvh] w-screen overflow-hidden flex flex-col md:flex-row antialiased">

    <div id="right-panel" class="chat-panel w-full md:w-[30%] h-1/2 md:h-full flex flex-col relative z-10">

        <header
            class="header-solar h-[60px] md:h-[70px] flex items-center justify-between px-3 md:px-5 shrink-0 gap-2 md:gap-4">

            <div class="flex items-center gap-2 md:gap-3">
                <svg class="w-8 h-8 md:w-10 md:h-10 drop-shadow-[0_0_18px_rgba(245,158,11,0.7)] shrink-0"
                    viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#fff7c0" />
                            <stop offset="45%" stop-color="#fde047" />
                            <stop offset="80%" stop-color="#f59e0b" />
                            <stop offset="100%" stop-color="#ea580c" />
                        </radialGradient>
                        <linearGradient id="ringGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#fbbf24" />
                            <stop offset="100%" stop-color="#ea580c" />
                        </linearGradient>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="2.5" result="coloredBlur" />
                            <feMerge>
                                <feMergeNode in="coloredBlur" />
                                <feMergeNode in="SourceGraphic" />
                            </feMerge>
                        </filter>
                    </defs>
                    <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(245,158,11,0.12)" stroke-width="8" />
                    <ellipse cx="50" cy="50" rx="44" ry="16" transform="rotate(-25 50 50)" stroke="url(#ringGrad)"
                        stroke-width="1.5" fill="none" opacity="0.7" stroke-dasharray="10 5" />
                    <ellipse cx="50" cy="50" rx="44" ry="16" transform="rotate(25 50 50)" stroke="url(#ringGrad)"
                        stroke-width="1.5" fill="none" opacity="0.4" />
                    <circle cx="50" cy="50" r="20" fill="url(#sunGlow)" filter="url(#glow)" />
                    <g stroke="#fde047" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)">
                        <line x1="50" y1="10" x2="50" y2="22" />
                        <line x1="50" y1="78" x2="50" y2="90" />
                        <line x1="10" y1="50" x2="22" y2="50" />
                        <line x1="78" y1="50" x2="90" y2="50" />
                        <line x1="22" y1="22" x2="30" y2="30" />
                        <line x1="70" y1="70" x2="78" y2="78" />
                        <line x1="22" y1="78" x2="30" y2="70" />
                        <line x1="70" y1="30" x2="78" y2="22" />
                    </g>
                    <path d="M 16 50 Q 33 28, 50 50 T 84 50" stroke="white" stroke-width="2.5" fill="none"
                        stroke-linecap="round" opacity="0.9" />
                </svg>
                <span class="app-name hidden sm:inline">SUNGraph AI</span>
            </div>

            <div class="flex items-center gap-1 md:gap-2 shrink-0">
                <span id="label-simple"
                    class="text-xs font-semibold label-active transition-colors whitespace-nowrap">Simple</span>
                <label for="mode-toggle" class="flex items-center cursor-pointer">
                    <div class="relative">
                        <input type="checkbox" id="mode-toggle" class="sr-only">
                        <div class="block w-12 h-7 rounded-full transition-colors duration-300 bg-amber-900/60 border border-amber-700/40"
                            id="toggle-bg"></div>
                        <div class="dot absolute left-1 top-1 bg-amber-300 w-5 h-5 rounded-full transition-transform duration-300 shadow-md"
                            style="box-shadow:0 0 8px rgba(245,158,11,0.7)"></div>
                    </div>
                </label>
                <span id="label-game"
                    class="text-xs font-semibold label-inactive transition-colors whitespace-nowrap">Game</span>
            </div>

            <div id="score-container" class="hidden score-badge shrink-0">
                <span class="text-xs font-bold text-amber-500/70 mr-1">SCORE</span>
                <span id="score-value"
                    class="text-lg font-black text-amber-300 font-mono transition-transform duration-150">0</span>
            </div>
        </header>

        <div id="chat-history"
            class="flex-1 overflow-y-auto px-3 md:px-5 py-4 md:py-6 space-y-4 flex flex-col scroll-smooth">
        </div>

        <div class="input-area p-3 md:p-4 shrink-0">
            <form id="chat-form" class="flex items-center gap-3">
                <input type="text" id="chat-input" placeholder="Type an equation like y = sin(x)..."
                    class="chat-input-field flex-1" autocomplete="off">
                <button type="submit" class="send-btn" aria-label="Send">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <div id="left-panel" class="w-full md:w-[70%] h-1/2 md:h-full relative border-t md:border-t-0 border-slate-700/50">
        <div id="calculator-container" class="w-full h-full"></div>
        <div class="absolute top-4 left-1/2 -translate-x-1/2 z-10 pointer-events-none">
            <span class="graph-badge">SUNGraph AI</span>
        </div>
    </div>

    <script src="app.js?v=8"></script>
</body>

</html>
